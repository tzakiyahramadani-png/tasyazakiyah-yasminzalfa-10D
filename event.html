<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <title>Event - Toko Buku Tasya & Zalfa 2026</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            background: #ffe6f5;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            color: #a6006a;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        nav {
            background: #ff66b2;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(255, 102, 178, 0.4);
        }
        nav a {
            text-decoration: none;
            color: white;
            font-weight: 600;
            margin: 0 20px;
            font-size: 18px;
            transition: all 0.3s ease;
            position: relative;
        }
        nav a:hover,
        nav a.active {
            color: #fff0f6;
            font-weight: 700;
        }
        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            background: #ff007f;
            left: 0;
            bottom: -6px;
            transition: width 0.3s ease;
        }
        nav a:hover::after,
        nav a.active::after {
            width: 100%;
        }
        h1 {
            text-align: center;
            margin: 50px 10px 10px;
            font-size: 42px;
            color: #d81e78;
            text-shadow: 1px 1px 3px #ffb6d9;
            animation: fadeInDown 1s ease forwards;
        }
        h2 {
            text-align: center;
            color: #ff4081;
            font-weight: 800;
            margin: 0 10px 25px;
            font-size: 28px;
            letter-spacing: 1.5px;
            animation: fadeInUp 1s ease 0.3s forwards;
            opacity: 0;
        }
        p {
            max-width: 600px;
            margin: 0 auto 40px;
            font-size: 20px;
            text-align: center;
            color: #900049;
            font-weight: 500;
            animation: fadeInUp 1s ease 0.6s forwards;
            opacity: 0;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
            from {
                opacity: 0;
                transform: translateY(20px);
            }
        }
    </style>
</head>
